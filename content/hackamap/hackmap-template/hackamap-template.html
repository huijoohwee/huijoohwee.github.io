<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hackamap Template — 3D Knowledge Graph</title>
    <style>
      html, body { height: 100%; margin: 0; background: #05060a; color: #e9eefc; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; }
      #app { position: relative; height: 100%; width: 100%; overflow: hidden; }
      #hud {
        position: absolute; left: 16px; top: 16px; z-index: 20;
        width: min(540px, calc(100vw - 32px));
        background: rgba(10, 12, 20, 0.62);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(10px);
        border-radius: 14px;
        padding: 12px 12px 10px;
      }
      #hud h1 { font-size: 14px; margin: 0 0 6px 0; font-weight: 650; letter-spacing: 0.2px; }
      #hud .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      #hud input[type="search"] {
        flex: 1 1 260px;
        padding: 10px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(0,0,0,0.35);
        color: #e9eefc;
        outline: none;
      }
      #hud label { font-size: 12px; opacity: 0.92; user-select: none; }
      #hud .chip {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(0,0,0,0.28);
      }
      #hud .chip input { accent-color: #7aa7ff; }
      #hud .small { font-size: 12px; opacity: 0.84; margin-top: 8px; line-height: 1.35; }
      #hud a { color: #a9c7ff; text-decoration: none; }
      #hud a:hover { text-decoration: underline; }
      #tooltip {
        position: absolute; z-index: 30;
        pointer-events: none;
        max-width: 420px;
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(10,12,20,0.82);
        border: 1px solid rgba(255,255,255,0.14);
        backdrop-filter: blur(10px);
        box-shadow: 0 12px 28px rgba(0,0,0,0.45);
        display: none;
      }
      #tooltip .t { font-weight: 650; margin-bottom: 4px; }
      #tooltip .m { font-size: 12px; opacity: 0.88; line-height: 1.35; }
      #tooltip .meta { font-size: 12px; opacity: 0.78; margin-top: 6px; }
      #status {
        position: absolute; right: 16px; bottom: 16px; z-index: 20;
        padding: 8px 10px;
        border-radius: 12px;
        background: rgba(10,12,20,0.55);
        border: 1px solid rgba(255,255,255,0.12);
        backdrop-filter: blur(10px);
        font-size: 12px;
        opacity: 0.9;
      }
      canvas { display: block; }
    </style>

    <!-- Import maps for Three.js modules -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <div id="hud">
        <h1>Hackamap Template — 3D Knowledge Graph</h1>
        <div class="row">
          <input id="search" type="search" placeholder="Search nodes (name, domain, type)…" />
          <span class="chip"><input id="toggleGalaxy" type="checkbox" checked /><label for="toggleGalaxy">Galaxy layout</label></span>
        </div>
        <div class="row" style="margin-top: 8px;">
          <span class="chip"><input id="fProduct" type="checkbox" checked /><label for="fProduct">Products</label></span>
          <span class="chip"><input id="fGap" type="checkbox" checked /><label for="fGap">Gaps</label></span>
          <span class="chip"><input id="fOpportunity" type="checkbox" checked /><label for="fOpportunity">Opportunities</label></span>
          <span class="chip"><input id="fSource" type="checkbox" checked /><label for="fSource">Sources</label></span>
        </div>
        <div class="small">
          Data loader: tries <code>hackamap-graph.json</code> in the same folder (optional).
          If missing, uses a tiny built-in sample. Tip: you can export nodes/links from PostgreSQL as described in <code>hackmap-template.md</code>.
        </div>
      </div>
      <div id="tooltip"></div>
      <div id="status">Loading…</div>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";
      import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
      import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
      import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

      // Optional force layout (kept lightweight).
      // If CDN fails, the graph will still render with galaxy/static layout.
      async function importForce3D() {
        try {
          const mod = await import("https://cdn.jsdelivr.net/npm/d3-force-3d@3/+esm");
          return mod;
        } catch {
          return null;
        }
      }

      const appEl = document.getElementById("app");
      const tooltipEl = document.getElementById("tooltip");
      const statusEl = document.getElementById("status");

      const ui = {
        search: document.getElementById("search"),
        toggleGalaxy: document.getElementById("toggleGalaxy"),
        fProduct: document.getElementById("fProduct"),
        fGap: document.getElementById("fGap"),
        fOpportunity: document.getElementById("fOpportunity"),
        fSource: document.getElementById("fSource"),
      };

      const COLOR = {
        product: 0x7aa7ff,
        gap: 0xffc36e,
        opportunity: 0x69f0ae,
        source: 0xd8b4fe,
        link: 0x2a3250,
        highlight: 0xffffff
      };

      const fallbackGraph = {
        nodes: [
          { id: "prod:example", type: "product", label: "Example Product", domain: "knowledge_management", score: 4.2, meta: "A placeholder product node." },
          { id: "gap:example", type: "gap", label: "Unaddressed adjacent pain", domain: "knowledge_management", score: 8, meta: "A placeholder gap signal." },
          { id: "opp:example", type: "opportunity", label: "Whitespace Opportunity", domain: "knowledge_management", score: 9, meta: "A rolled-up opportunity." },
          { id: "src:example", type: "source", label: "Verifiable Source", url: "https://example.com", meta: "Cite primary evidence here." }
        ],
        links: [
          { source: "prod:example", target: "gap:example", type: "has_gap" },
          { source: "gap:example", target: "opp:example", type: "rolls_up_to" },
          { source: "prod:example", target: "src:example", type: "cited_by" }
        ]
      };

      async function loadGraph() {
        // Optional external file name; keep separate from hackamap-template.json (relational template).
        const url = new URL(window.location.href);
        const candidate = url.searchParams.get("graph") || "hackamap-graph.json";
        try {
          const res = await fetch(candidate, { cache: "no-store" });
          if (!res.ok) throw new Error("no graph file");
          const data = await res.json();
          if (!data?.nodes?.length) throw new Error("invalid graph");
          return data;
        } catch {
          return fallbackGraph;
        }
      }

      // Scene setup
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x05060a, 1);
      appEl.appendChild(renderer.domElement);

      const scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x05060a, 0.00085);

      const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
      camera.position.set(0, 120, 420);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.minDistance = 80;
      controls.maxDistance = 1300;

      // Lighting
      scene.add(new THREE.AmbientLight(0x8aa3ff, 0.22));
      const key = new THREE.DirectionalLight(0xffffff, 0.9);
      key.position.set(220, 350, 180);
      scene.add(key);

      // Postprocessing (bloom)
      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.85, 0.7, 0.08);
      composer.addPass(bloom);

      // Starfield / milky band
      function makeStarfield() {
        const starCount = 22000;
        const positions = new Float32Array(starCount * 3);
        const colors = new Float32Array(starCount * 3);
        const color = new THREE.Color();

        for (let i = 0; i < starCount; i++) {
          // Galaxy-like disk with a brighter band.
          const r = Math.pow(Math.random(), 0.55) * 1600;
          const angle = Math.random() * Math.PI * 2;
          const y = (Math.random() - 0.5) * 120 * (0.35 + Math.random());
          const x = Math.cos(angle) * r + (Math.random() - 0.5) * 20;
          const z = Math.sin(angle) * r + (Math.random() - 0.5) * 20;

          positions[i * 3 + 0] = x;
          positions[i * 3 + 1] = y;
          positions[i * 3 + 2] = z;

          // Slightly bluish-white stars with rare warm stars.
          const t = Math.random();
          if (t < 0.08) color.setHSL(0.08, 0.65, 0.75); // warm
          else color.setHSL(0.60, 0.55, 0.80); // cool

          const intensity = 0.25 + Math.random() * 0.9;
          colors[i * 3 + 0] = color.r * intensity;
          colors[i * 3 + 1] = color.g * intensity;
          colors[i * 3 + 2] = color.b * intensity;
        }

        const geom = new THREE.BufferGeometry();
        geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
        geom.setAttribute("color", new THREE.BufferAttribute(colors, 3));
        const mat = new THREE.PointsMaterial({
          size: 1.05,
          vertexColors: true,
          transparent: true,
          opacity: 0.85,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        return new THREE.Points(geom, mat);
      }
      scene.add(makeStarfield());

      // Graph objects
      const graphGroup = new THREE.Group();
      scene.add(graphGroup);

      const nodeMeshes = new Map(); // id -> mesh
      let linkLines = null;
      let graph = null;
      let force3d = null;
      let forceSim = null;

      function typeEnabled(type) {
        if (type === "product") return ui.fProduct.checked;
        if (type === "gap") return ui.fGap.checked;
        if (type === "opportunity") return ui.fOpportunity.checked;
        if (type === "source") return ui.fSource.checked;
        return true;
      }

      function nodeColor(node) {
        const base = COLOR[node.type] ?? 0x9aa7c2;
        return base;
      }

      function nodeRadius(node) {
        const s = (typeof node.score === "number") ? node.score : 3.0;
        // Score ranges:
        // - value triangle: 1-5
        // - gap/opportunity: 1-10
        // Normalize gently.
        const n = (s <= 5) ? (s / 5) : (s / 10);
        return 2.2 + n * 6.0;
      }

      function clearGraphObjects() {
        for (const m of nodeMeshes.values()) {
          graphGroup.remove(m);
          m.geometry?.dispose?.();
          m.material?.dispose?.();
        }
        nodeMeshes.clear();
        if (linkLines) {
          graphGroup.remove(linkLines);
          linkLines.geometry?.dispose?.();
          linkLines.material?.dispose?.();
          linkLines = null;
        }
      }

      function galaxyPosition(i, n, node) {
        // 2-armed spiral + noise, with a thin band on Y.
        const arm = i % 2;
        const t = i / Math.max(1, n - 1);
        const r = 40 + Math.pow(t, 0.72) * 420;
        const theta = t * 10.0 + arm * Math.PI + (Math.random() - 0.5) * 0.55;
        const x = Math.cos(theta) * r + (Math.random() - 0.5) * 22;
        const z = Math.sin(theta) * r + (Math.random() - 0.5) * 22;
        const y = (Math.random() - 0.5) * 34 + (node.type === "gap" ? 6 : 0);
        return new THREE.Vector3(x, y, z);
      }

      function rebuildGraph(graphData) {
        graph = graphData;
        clearGraphObjects();

        const nodes = graph.nodes ?? [];
        const links = graph.links ?? [];

        // Create nodes
        const sphere = new THREE.SphereGeometry(1, 22, 22);
        for (let i = 0; i < nodes.length; i++) {
          const node = nodes[i];
          const mat = new THREE.MeshStandardMaterial({
            color: nodeColor(node),
            emissive: new THREE.Color(nodeColor(node)).multiplyScalar(0.35),
            emissiveIntensity: 1.0,
            roughness: 0.35,
            metalness: 0.15
          });

          const mesh = new THREE.Mesh(sphere, mat);
          const r = nodeRadius(node);
          mesh.scale.setScalar(r);
          mesh.userData = { node };
          mesh.visible = typeEnabled(node.type);

          const p = galaxyPosition(i, nodes.length, node);
          mesh.position.copy(p);
          node.x = p.x; node.y = p.y; node.z = p.z;

          nodeMeshes.set(node.id, mesh);
          graphGroup.add(mesh);
        }

        // Create links
        const linkPositions = new Float32Array(links.length * 2 * 3);
        for (let i = 0; i < links.length; i++) {
          const l = links[i];
          const s = nodeMeshes.get(l.source)?.position ?? new THREE.Vector3();
          const t = nodeMeshes.get(l.target)?.position ?? new THREE.Vector3();
          linkPositions[i * 6 + 0] = s.x; linkPositions[i * 6 + 1] = s.y; linkPositions[i * 6 + 2] = s.z;
          linkPositions[i * 6 + 3] = t.x; linkPositions[i * 6 + 4] = t.y; linkPositions[i * 6 + 5] = t.z;
        }
        const linkGeom = new THREE.BufferGeometry();
        linkGeom.setAttribute("position", new THREE.BufferAttribute(linkPositions, 3));
        const linkMat = new THREE.LineBasicMaterial({ color: COLOR.link, transparent: true, opacity: 0.55 });
        linkLines = new THREE.LineSegments(linkGeom, linkMat);
        graphGroup.add(linkLines);

        statusEl.textContent = `Nodes: ${nodes.length} · Links: ${links.length}`;
      }

      function updateVisibility() {
        for (const mesh of nodeMeshes.values()) {
          const { node } = mesh.userData;
          const q = ui.search.value.trim().toLowerCase();
          const text = `${node.label ?? ""} ${node.domain ?? ""} ${node.type ?? ""}`.toLowerCase();
          const matches = !q || text.includes(q);
          mesh.visible = typeEnabled(node.type) && matches;
        }
        // Links stay visible but dim when endpoints hidden.
      }

      // Picking
      const raycaster = new THREE.Raycaster();
      const pointer = new THREE.Vector2();
      let hovered = null;
      let selected = null;

      function setTooltip(node, clientX, clientY) {
        if (!node) {
          tooltipEl.style.display = "none";
          return;
        }
        const url = node.url ? `<div class="meta"><a href="${node.url}" target="_blank" rel="noreferrer">Open source</a></div>` : "";
        tooltipEl.innerHTML = `
          <div class="t">${escapeHtml(node.label ?? node.id)}</div>
          <div class="m">${escapeHtml(node.meta ?? "")}</div>
          <div class="meta">type: ${escapeHtml(node.type ?? "")}${node.domain ? ` · domain: ${escapeHtml(node.domain)}` : ""}${(typeof node.score === "number") ? ` · score: ${node.score}` : ""}</div>
          ${url}
        `;
        tooltipEl.style.display = "block";
        tooltipEl.style.left = `${Math.min(clientX + 14, window.innerWidth - 440)}px`;
        tooltipEl.style.top = `${Math.min(clientY + 14, window.innerHeight - 200)}px`;
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;" }[c]));
      }

      function highlight(mesh, on) {
        if (!mesh) return;
        const node = mesh.userData.node;
        const c = on ? COLOR.highlight : nodeColor(node);
        mesh.material.color.setHex(c);
        mesh.material.emissive.setHex(on ? 0xffffff : nodeColor(node));
        mesh.material.emissiveIntensity = on ? 1.0 : 0.8;
      }

      renderer.domElement.addEventListener("pointermove", (e) => {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -(((e.clientY - rect.top) / rect.height) * 2 - 1);

        raycaster.setFromCamera(pointer, camera);
        const meshes = [...nodeMeshes.values()].filter(m => m.visible);
        const hits = raycaster.intersectObjects(meshes, false);
        const hit = hits[0]?.object ?? null;

        if (hit !== hovered) {
          if (hovered && hovered !== selected) highlight(hovered, false);
          hovered = hit;
          if (hovered && hovered !== selected) highlight(hovered, true);
        }

        if (hovered) setTooltip(hovered.userData.node, e.clientX, e.clientY);
        else setTooltip(null);
      });

      renderer.domElement.addEventListener("click", () => {
        if (selected) highlight(selected, false);
        selected = hovered;
        if (selected) highlight(selected, true);
      });

      // Force layout (optional)
      async function setLayout(useGalaxy) {
        if (!graph) return;
        if (useGalaxy) {
          if (forceSim) forceSim.stop();
          forceSim = null;
          // Re-galaxy positions
          const nodes = graph.nodes ?? [];
          for (let i = 0; i < nodes.length; i++) {
            const node = nodes[i];
            const mesh = nodeMeshes.get(node.id);
            if (!mesh) continue;
            const p = galaxyPosition(i, nodes.length, node);
            mesh.position.copy(p);
            node.x = p.x; node.y = p.y; node.z = p.z;
          }
          updateLinks();
          return;
        }

        force3d = force3d ?? await importForce3D();
        if (!force3d) return;

        const nodes = (graph.nodes ?? []).map(n => ({ ...n }));
        const links = (graph.links ?? []).map(l => ({ ...l }));

        // Map ids to refs d3-force expects
        const nodeById = new Map(nodes.map(n => [n.id, n]));
        for (const l of links) {
          l.source = nodeById.get(l.source) ?? l.source;
          l.target = nodeById.get(l.target) ?? l.target;
        }

        const sim = force3d.forceSimulation(nodes)
          .numDimensions(3)
          .force("link", force3d.forceLink(links).id(d => d.id).distance(52).strength(0.25))
          .force("charge", force3d.forceManyBody().strength(-70))
          .force("center", force3d.forceCenter(0, 0, 0))
          .force("collide", force3d.forceCollide(d => nodeRadius(d) * 1.25).iterations(2));

        // Start from current mesh positions
        for (const n of nodes) {
          const m = nodeMeshes.get(n.id);
          if (!m) continue;
          n.x = m.position.x; n.y = m.position.y; n.z = m.position.z;
        }

        forceSim = sim;
        let ticks = 0;
        sim.on("tick", () => {
          ticks++;
          for (const n of nodes) {
            const m = nodeMeshes.get(n.id);
            if (!m) continue;
            m.position.set(n.x, n.y, n.z);
          }
          updateLinks();
          // Let it settle then keep running slowly.
          if (ticks > 260) sim.alphaTarget(0.02);
        });
      }

      function updateLinks() {
        if (!linkLines || !graph) return;
        const links = graph.links ?? [];
        const pos = linkLines.geometry.attributes.position.array;
        for (let i = 0; i < links.length; i++) {
          const l = links[i];
          const s = nodeMeshes.get(l.source)?.position;
          const t = nodeMeshes.get(l.target)?.position;
          if (!s || !t) continue;
          pos[i * 6 + 0] = s.x; pos[i * 6 + 1] = s.y; pos[i * 6 + 2] = s.z;
          pos[i * 6 + 3] = t.x; pos[i * 6 + 4] = t.y; pos[i * 6 + 5] = t.z;
        }
        linkLines.geometry.attributes.position.needsUpdate = true;
      }

      // UI wiring
      ui.search.addEventListener("input", updateVisibility);
      ui.fProduct.addEventListener("change", updateVisibility);
      ui.fGap.addEventListener("change", updateVisibility);
      ui.fOpportunity.addEventListener("change", updateVisibility);
      ui.fSource.addEventListener("change", updateVisibility);
      ui.toggleGalaxy.addEventListener("change", () => setLayout(ui.toggleGalaxy.checked));

      // Resize
      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
      });

      // Main loop
      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        composer.render();
      }

      // Boot
      (async () => {
        statusEl.textContent = "Loading graph…";
        const graphData = await loadGraph();
        rebuildGraph(graphData);
        updateVisibility();
        await setLayout(true);
        animate();
      })();
    </script>
  </body>
</html>
