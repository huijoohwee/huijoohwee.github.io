    <rect class="band" x="0" y="0" width="1920" height="190"/>
    <text class="bandlbl" x="960" y="98">&#x6807;&#x9898; / TITLE</text>
    <text class="bandsub" x="960" y="138">&#x5267;&#x540D; &#xB7; &#x96C6;&#x6570; &#xB7; &#x65F6;&#x957F;  |  Series &#xB7; Episode &#xB7; Runtime</text>
  </g>

