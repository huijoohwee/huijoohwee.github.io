<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="-apple-system, 'Segoe UI', 'Noto Sans', sans-serif">
  <title>Mini-Drama Storyboard &#x2014; Variant A (Classic Split) &#xB7; 16:9</title>
  <desc>Neutral, brand-agnostic mini-drama storyboard template: full-width title band, 6x6 numbered beat grid, 3x3 9:16 poster-wall funnel, full-width image band.</desc>

  <style>
    .canvas   { fill: #ffffff; }
    .band     { fill: #f4f4f5; stroke: #d4d4d8; stroke-width: 1.5; }
    .bandlbl  { fill: #71717a; font-size: 34px; font-weight: 600; letter-spacing: 2px; text-anchor: middle; }
    .bandsub  { fill: #a1a1aa; font-size: 18px; letter-spacing: 1px; text-anchor: middle; }
    .crop     { fill: none; stroke: #c4c4c8; stroke-width: 1.5; stroke-dasharray: 10 8; }
    .cell     { fill: #ffffff; stroke: #d4d4d8; stroke-width: 1.5; }
    .badge    { fill: #18181b; }
    .badgetxt { fill: #ffffff; font-size: 13px; font-weight: 700; text-anchor: middle; }
    .subcn    { fill: #71717a; font-size: 15px; text-anchor: middle; }
    .suben    { fill: #a1a1aa; font-size: 13px; font-style: italic; text-anchor: middle; }
    .secttl   { fill: #52525b; font-size: 18px; font-weight: 700; letter-spacing: 1px; text-anchor: middle; }
    .slot     { fill: #fafafa; stroke: #d4d4d8; stroke-width: 1.5; }
    .slotc    { fill: #fafafa; stroke: #18181b; stroke-width: 3; }
    .sloteq   { fill: #d4d4d8; font-size: 26px; font-weight: 700; text-anchor: middle; }
    .slotbun  { fill: #52525b; font-size: 15px; font-weight: 700; text-anchor: middle; }
    .slotpr   { fill: #a1a1aa; font-size: 13px; text-anchor: middle; }
    .ribbon   { fill: #18181b; }
    .ribbontx { fill: #ffffff; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-anchor: middle; }
    .beatband { fill: #18181b; }
    .beattx   { fill: #ffffff; font-size: 12.5px; font-weight: 700; letter-spacing: 0.5px; text-anchor: middle; }
  </style>

  <rect class="canvas" x="0" y="0" width="1920" height="1080"/>

  <!-- ===================== TITLE BAND (top, full width, h=190) ===================== -->
