<title>Full-Stack AI-Native · Knowledge Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden;font-family:'Courier New',monospace;color:#c8d0f0;user-select:none}
canvas{display:block}

#tooltip{
  position:fixed;pointer-events:none;
  background:rgba(5,5,20,0.95);
  border:1px solid rgba(130,140,255,0.4);
  padding:8px 14px;border-radius:3px;
  font-size:11px;white-space:nowrap;
  z-index:200;opacity:0;
  transition:opacity 0.12s;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(80,80,255,0.2);
}
#tooltip.on{opacity:1}
#tt-badge{font-size:9px;text-transform:uppercase;letter-spacing:.15em;opacity:.5;margin-bottom:3px}
#tt-name{font-size:13px;font-weight:bold}

#panel{
  position:fixed;right:24px;top:50%;
  transform:translateY(-50%) translateX(30px);
  width:300px;
  background:rgba(5,5,22,0.96);
  border:1px solid rgba(100,110,255,0.3);
  border-radius:6px;padding:22px;
  z-index:200;opacity:0;
  transition:opacity .25s,transform .25s;
  backdrop-filter:blur(14px);
  box-shadow:0 0 40px rgba(50,50,200,0.15);
}
#panel.on{opacity:1;transform:translateY(-50%) translateX(0)}
#panel-close{
  position:absolute;top:12px;right:14px;
  cursor:pointer;opacity:.4;font-size:15px;
  background:none;border:none;color:inherit;
  transition:opacity .15s;
}
#panel-close:hover{opacity:1}
.p-badge{font-size:9px;text-transform:uppercase;letter-spacing:.18em;opacity:.45;margin-bottom:7px}
.p-name{font-size:17px;font-weight:bold;line-height:1.3;margin-bottom:10px}
.p-cluster{font-size:11px;opacity:.55;margin-bottom:16px;line-height:1.5}
.p-body{font-size:11px;line-height:1.75}
.tag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:9px;letter-spacing:.1em;margin:2px;text-transform:uppercase}
.tag-g{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.tag-r{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.tag-n{background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)}
.p-pain{margin-top:12px;padding:10px 12px;background:rgba(255,200,50,.05);border-left:2px solid rgba(255,200,50,.3);font-size:11px;line-height:1.6;opacity:.85}
.p-url{display:block;margin-top:12px;color:#818cf8;font-size:10px;text-decoration:none;word-break:break-all}
.p-url:hover{color:#a5b4fc}
.p-phase{margin-top:10px;font-size:10px;opacity:.45}

#hud-title{
  position:fixed;left:22px;top:22px;z-index:100;
}
#hud-title h1{font-size:13px;text-transform:uppercase;letter-spacing:.22em;color:#818cf8}
#hud-title p{font-size:10px;opacity:.3;margin-top:3px;letter-spacing:.1em}

#legend{
  position:fixed;left:22px;bottom:64px;z-index:100;
  display:flex;flex-direction:column;gap:7px;
}
.leg-row{display:flex;align-items:center;gap:8px;font-size:10px;letter-spacing:.05em;opacity:.75}
.leg-cube{width:11px;height:11px;border-radius:1px;flex-shrink:0}

#node-legend{
  position:fixed;right:24px;bottom:64px;z-index:100;
  font-size:9px;text-align:right;opacity:.45;line-height:2;letter-spacing:.08em;text-transform:uppercase;
}

#statsbar{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
  z-index:100;display:flex;gap:28px;
  font-size:9px;letter-spacing:.12em;text-transform:uppercase;opacity:.4;
}
.stat .v{font-size:16px;display:block;font-weight:bold;opacity:.9;margin-bottom:2px}

#controls{
  position:fixed;top:22px;right:24px;z-index:100;
  font-size:9px;opacity:.3;text-align:right;line-height:2;letter-spacing:.1em;text-transform:uppercase;
}

renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x050510, 0.00028);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth/window.innerHeight, 1, 9000);

// ═══════════════════════════════════════════════════════════ CAMERA ORBIT
let camTheta = -0.5, camPhi = 1.05, camRadius = 1550;
const camTarget = new THREE.Vector3(0, 60, 0);

function updateCamera() {
  camera.position.set(
    camTarget.x + camRadius * Math.sin(camPhi) * Math.cos(camTheta),
    camTarget.y + camRadius * Math.cos(camPhi),
    camTarget.z + camRadius * Math.sin(camPhi) * Math.sin(camTheta)
  );
  camera.lookAt(camTarget);
}
updateCamera();

// ═══════════════════════════════════════════════════════════ LIGHTS
scene.add(new THREE.AmbientLight(0x0d0d28, 2.5));

const dirLight = new THREE.DirectionalLight(0x8090ff, 0.6);
dirLight.position.set(300, 600, 200);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048,2048);
scene.add(dirLight);

const clusterLights = {};
G.clusters.forEach(c => {
  const r = 490, a = c.angle*Math.PI/180;
  const pl = new THREE.PointLight(parseInt(c.color.replace('#',''),16), 1.8, 700);
  pl.position.set(r*Math.cos(a), 100, r*Math.sin(a));
  scene.add(pl);
  clusterLights[c.id] = pl;
});

// central glow
const centerLight = new THREE.PointLight(0x5060ff, 1.2, 450);
centerLight.position.set(0, 80, 0);
scene.add(centerLight);

// ═══════════════════════════════════════════════════════════ GRID FLOOR
const gridHelper = new THREE.GridHelper(3200, 80, 0x0c1038, 0x080c28);
gridHelper.position.y = -0.5;
scene.add(gridHelper);

// ═══════════════════════════════════════════════════════════ LAYOUT
const HUB_R = 490, PROB_R = 185, SOL_R = 335, GRID = 30, CON_R = 170;

const snap = v => Math.round(v/GRID)*GRID;

const clusterMap = {};
G.clusters.forEach(c => { clusterMap[c.id] = c; });

function clusterHub(cid) {
  const c = clusterMap[cid];
  const a = c.angle * Math.PI / 180;
  return {x: HUB_R*Math.cos(a), z: HUB_R*Math.sin(a), a};
}

// Group nodes by cluster+type
const groups = {};
G.nodes.forEach(n => {
  if (n.type === 'problem' || n.type === 'solution') {
    const key = n.cluster + ':' + n.type;
    if (!groups[key]) groups[key] = [];
    groups[key].push(n.id);
  }
});

// Concept nodes
const conceptNodes = G.nodes.filter(n => n.type === 'concept');

const positions = {};

G.nodes.forEach(n => {
  let x = 0, z = 0;

  if (n.type === 'hub') {
    const cc = clusterHub(n.cluster);
    x = snap(cc.x); z = snap(cc.z);

  } else if (n.type === 'problem') {
    const cc = clusterHub(n.cluster);
    const list = groups[n.cluster+':problem'];
    const idx = list.indexOf(n.id);
    const cnt = list.length;
    const spread = 60 * Math.PI/180;
    const step = cnt > 1 ? (spread*2)/(cnt-1) : 0;
    const offset = -spread + idx*step;
    const a = cc.a + offset;
    x = snap(cc.x + PROB_R*Math.cos(a));
    z = snap(cc.z + PROB_R*Math.sin(a));

  } else if (n.type === 'solution') {
    const cc = clusterHub(n.cluster);
    const list = groups[n.cluster+':solution'];
    const idx = list.indexOf(n.id);
    const cnt = list.length;
    const spread = 75 * Math.PI/180;
    const step = cnt > 1 ? (spread*2)/(cnt-1) : 0;
    const offset = -spread + idx*step;
    const a = cc.a + offset;
    x = snap(cc.x + SOL_R*Math.cos(a));
    z = snap(cc.z + SOL_R*Math.sin(a));

  } else if (n.type === 'concept') {
    const idx = conceptNodes.findIndex(c => c.id === n.id);
    const total = conceptNodes.length;
    const a = (idx/total)*Math.PI*2 - Math.PI/6;
    x = snap(CON_R*Math.cos(a));
    z = snap(CON_R*Math.sin(a));
  }

  positions[n.id] = {x, z};
});

// ═══════════════════════════════════════════════════════════ NODE SPECS
const SPECS = {
  hub:     {w:52, h:66, d:52, ei:0.65, roughness:0.15, metalness:0.9},
  problem: {w:28, h:32, d:28, ei:0.38, roughness:0.25, metalness:0.7},
  solution:{w:22, h:22, d:22, ei:0.3,  roughness:0.2,  metalness:0.8},
  concept: {w:30, h:44, d:30, ei:0.5,  roughness:0.1,  metalness:0.95}
};

const meshes = [];
const meshById = {};
const nodeByMesh = new WeakMap();

G.nodes.forEach(n => {
  const pos = positions[n.id];
  if (!pos) return;
  const sp = SPECS[n.type] || SPECS.solution;
  const cl = n.cluster ? clusterMap[n.cluster] : null;
  const hex = cl ? cl.color : '#9098c0';
  const tc = new THREE.Color(hex);

  const geo = new THREE.BoxGeometry(sp.w, sp.h, sp.d);
  const mat = new THREE.MeshStandardMaterial({
    color: tc.clone().multiplyScalar(0.22),
    emissive: tc.clone(),
    emissiveIntensity: sp.ei,
    roughness: sp.roughness,
    metalness: sp.metalness,
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos.x, sp.h/2, pos.z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = {nodeId: n.id, node: n, baseEI: sp.ei, baseY: sp.h/2};

  scene.add(mesh);
  meshes.push(mesh);
  meshById[n.id] = mesh;
  nodeByMesh.set(mesh, n);

  // Top cap accent (thin bright slice on top of each voxel)
  const capGeo = new THREE.BoxGeometry(sp.w+0.5, 2, sp.d+0.5);
  const capMat = new THREE.MeshStandardMaterial({
    color: tc,
    emissive: tc,
    emissiveIntensity: 1.2,
    roughness: 0,
    metalness: 1,
  });
  const cap = new THREE.Mesh(capGeo, capMat);
  cap.position.set(pos.x, sp.h + 1, pos.z);
  scene.add(cap);
});

// ═══════════════════════════════════════════════════════════ ROLLOVER CUBE (voxel painter style)
const rolloverGeo = new THREE.BoxGeometry(1,1,1);
const rolloverMat = new THREE.MeshBasicMaterial({
  color: 0xffffff, opacity:0.18, transparent:true, depthWrite:false, side:THREE.FrontSide
});
const rollover = new THREE.Mesh(rolloverGeo, rolloverMat);
rollover.visible = false;
scene.add(rollover);

// Selection wireframe
const selWireGeo = new THREE.BoxGeometry(1,1,1);
const selWireMat = new THREE.MeshBasicMaterial({color:0xffffff, wireframe:true, opacity:0.5, transparent:true});
const selWire = new THREE.Mesh(selWireGeo, selWireMat);
selWire.visible = false;
scene.add(selWire);

// ═══════════════════════════════════════════════════════════ EDGES
function buildLines(pts, color, opacity, dashed=false) {
  if (!pts.length) return;
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = dashed
    ? new THREE.LineDashedMaterial({color, opacity, transparent:true, dashSize:8, gapSize:6, linewidth:1})
    : new THREE.LineBasicMaterial({color, opacity, transparent:true, linewidth:1});
  const ls = new THREE.LineSegments(geo, mat);
  if (dashed) ls.computeLineDistances();
  scene.add(ls);
}

const spokePts=[], solvesPts=[], conceptPts=[], bridgePts=[];

G.edges.forEach(e => {
  const sm = meshById[e.source], tm = meshById[e.target];
  if (!sm || !tm) return;
  const v1 = sm.position.clone();
  const v2 = tm.position.clone();
  switch(e.type) {
    case 'spoke':   spokePts.push(v1,v2);   break;
    case 'solves':  solvesPts.push(v1,v2);  break;
    case 'concept': conceptPts.push(v1,v2); break;
    case 'bridge':  bridgePts.push(v1,v2);  break;
  }
});

buildLines(spokePts,   0x2030a0, 0.18);
buildLines(solvesPts,  0x20a050, 0.28);
buildLines(conceptPts, 0xa08020, 0.25, true);
buildLines(bridgePts,  0xffffff, 0.65);

// ═══════════════════════════════════════════════════════════ BRIDGE LABELS (floating chips)
// We'll draw thin horizontal bars to indicate protocol labels for bridges
G.edges.filter(e=>e.type==='bridge').forEach(e => {
  const sm = meshById[e.source], tm = meshById[e.target];
  if (!sm || !tm || !e.protocol) return;
  const mid = sm.position.clone().add(tm.position).multiplyScalar(0.5);
  const cl = clusterMap[e.type] || {color:'#ffffff'};

  // small flat box at midpoint as visual marker
  const bg = new THREE.BoxGeometry(8, 4, 8);
  const bm = new THREE.MeshBasicMaterial({color:0xffffff, opacity:0.25, transparent:true});
  const b = new THREE.Mesh(bg, bm);
  b.position.copy(mid);
  b.position.y += 20;
  scene.add(b);
});

// ═══════════════════════════════════════════════════════════ LEGEND
const legendEl = document.getElementById('legend');
G.clusters.forEach(c => {
  const d = document.createElement('div');
  d.className = 'leg-row';
  d.innerHTML = `<div class="leg-cube" style="background:${c.color}"></div><span>${c.label}</span>`;
  legendEl.appendChild(d);
});

// ═══════════════════════════════════════════════════════════ INTERACTION
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
const panel = document.getElementById('panel');
let hovered = null, selected = null;
let mx = 0, my = 0;
let dragging = false, didDrag = false, prevMx=0, prevMy=0;
let autoRotate = true;

function showTooltip(n, x, y) {
  const cl = n.cluster ? clusterMap[n.cluster] : null;
  document.getElementById('tt-badge').textContent = n.type;
  document.getElementById('tt-name').textContent = n.label;
  document.getElementById('tt-name').style.color = cl ? cl.color : '#9098c0';
  tooltip.style.left = (x+18)+'px';
  tooltip.style.top  = (y-10)+'px';
  tooltip.classList.add('on');
}

function buildPanelHTML(n) {
  const cl = n.cluster ? clusterMap[n.cluster] : null;
  document.getElementById('p-badge').textContent = n.type;
  document.getElementById('p-name').textContent = n.label;
  document.getElementById('p-name').style.color = cl ? cl.color : '#9098c0';
  document.getElementById('p-cluster').textContent = cl
    ? `${cl.label}  ·  ${cl.desc}`
    : 'Cross-cluster principle';

  const m = n.meta || {};
  let html = '';

  if (m.foss !== undefined) {
    html += '<div style="margin-bottom:8px">';
    html += `<span class="tag ${m.foss?'tag-g':'tag-r'}">${m.foss?'FOSS':'Proprietary'}</span>`;
    if (m.local !== undefined) html += `<span class="tag ${m.local?'tag-g':'tag-n'}">${m.local?'Local':'Cloud'}</span>`;
    if (m.freeTier !== undefined) html += `<span class="tag ${m.freeTier?'tag-g':'tag-n'}">${m.freeTier?'Free tier':'Paid'}</span>`;
    html += '</div>';
  }
  if (m.phase !== undefined) html += `<div style="opacity:.4;font-size:10px;margin-bottom:8px">Phase ${m.phase}${m.priority?' · '+m.priority:''}</div>`;
  if (m.estMin) html += `<div style="opacity:.45;font-size:10px;margin-bottom:8px">⏱ ~${m.estMin} min setup</div>`;
  if (m.painPoint) html += `<div class="p-pain">⚠ ${m.painPoint}</div>`;
  if (m.description) html += `<div class="p-pain">${m.description}</div>`;
  if (m.note) html += `<div class="p-pain">📝 ${m.note}</div>`;
  if (m.url) html += `<a class="p-url" href="${m.url}" target="_blank">↗ ${m.url.replace('https://','')}</a>`;

  document.getElementById('p-body').innerHTML = html;
  panel.classList.add('on');
}

function clearSelection() {
  if (selected) {
    selected.material.emissiveIntensity = selected.userData.baseEI;
    selected = null;
  }
  selWire.visible = false;
  panel.classList.remove('on');
}

document.getElementById('panel-close').addEventListener('click', clearSelection);

canvas.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  mouse.x = (e.clientX/window.innerWidth)*2-1;
  mouse.y = -(e.clientY/window.innerHeight)*2+1;
  if (dragging) {
    const dx = e.clientX - prevMx, dy = e.clientY - prevMy;
    if (Math.abs(dx)+Math.abs(dy) > 2) didDrag = true;
    camTheta -= dx*0.0048;
    camPhi = Math.max(0.18, Math.min(Math.PI*0.49, camPhi + dy*0.0048));
    prevMx = e.clientX; prevMy = e.clientY;
    autoRotate = false;
  }
});

canvas.addEventListener('mousedown', e => {
  dragging = true; didDrag = false;
  prevMx = e.clientX; prevMy = e.clientY;
});
window.addEventListener('mouseup', () => { dragging = false; });

canvas.addEventListener('click', e => {
  if (didDrag) return;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length) {
    const mesh = hits[0].object;
    if (selected && selected !== mesh) selected.material.emissiveIntensity = selected.userData.baseEI;
    selected = mesh;
    selected.material.emissiveIntensity = 1.3;
    // position selection wireframe
    const sp2 = SPECS[mesh.userData.node.type] || SPECS.solution;
    selWire.scale.set(sp2.w+5, sp2.h+5, sp2.d+5);
    selWire.position.copy(mesh.position);
    selWire.visible = true;
    buildPanelHTML(mesh.userData.node);
    autoRotate = false;
  } else {
    clearSelection();
  }
});

canvas.addEventListener('wheel', e => {
  camRadius = Math.max(350, Math.min(3200, camRadius + e.deltaY*0.9));
  autoRotate = false;
  e.preventDefault();
}, {passive:false});

// ═══════════════════════════════════════════════════════════ ANIMATION
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (autoRotate && !dragging) camTheta += 0.00028;

  // Hub pulse
  G.nodes.filter(n=>n.type==='hub').forEach(n => {
    const m = meshById[n.id];
    if (!m) return;
    const p = 0.15 * Math.sin(t*1.4 + G.clusters.findIndex(c=>c.id===n.cluster)*1.3);
    m.material.emissiveIntensity = (m===selected?1.3:m.userData.baseEI) + p;
    m.position.y = m.userData.baseY + Math.sin(t*0.9 + G.clusters.findIndex(c=>c.id===n.cluster))*1.5;
  });

  // Concept nodes gentle float
  G.nodes.filter(n=>n.type==='concept').forEach((n,i) => {
    const m = meshById[n.id];
    if (!m) return;
    m.position.y = m.userData.baseY + Math.sin(t*0.7 + i*1.1)*4;
    m.rotation.y = t*0.3 + i*0.8;
  });

  // Rollover + hover detect
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length && !dragging) {
    const mesh = hits[0].object;
    const n = mesh.userData.node;
    const sp2 = SPECS[n.type] || SPECS.solution;
    rollover.scale.set(sp2.w+8, sp2.h+8, sp2.d+8);
    rollover.position.copy(mesh.position);
    rollover.visible = true;
    canvas.style.cursor = 'pointer';
    if (mesh !== hovered) {
      if (hovered && hovered !== selected) hovered.material.emissiveIntensity = hovered.userData.baseEI;
      hovered = mesh;
      if (mesh !== selected) mesh.material.emissiveIntensity = Math.min(0.9, mesh.userData.baseEI*1.7);
    }
    showTooltip(n, mx, my);
  } else {
    rollover.visible = false;
    canvas.style.cursor = 'default';
    tooltip.classList.remove('on');
    if (hovered && hovered !== selected) {
      hovered.material.emissiveIntensity = hovered.userData.baseEI;
      hovered = null;
    }
  }

  // selWire spin
  if (selWire.visible) selWire.rotation.y = t * 0.5;

  // Center light pulse
  centerLight.intensity = 1.0 + 0.4 * Math.sin(t * 0.8);

  updateCamera();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
